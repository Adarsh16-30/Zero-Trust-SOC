x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

x-security: &default-security
  security_opt:
    - no-new-privileges:true

services:

  docker-socket-proxy:
    image: tecnativa/docker-socket-proxy
    container_name: docker-socket-proxy
    environment:
      - CONTAINERS=1
      - NETWORKS=1
      - IMAGES=1
      - BUILD=1
      - INFO=1
      - POST=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    deploy:
      resources:
        limits:
          memory: 64M
    logging: *default-logging
    restart: always
    networks:
      - soc-net

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    user: "1000:1000"
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    deploy:
      resources:
        limits:
          memory: 192M
    healthcheck:
      test: ["CMD", "bash", "-c", "echo ruok | nc localhost 2181"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging: *default-logging
    <<: *default-security
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - FOWNER
    restart: always
    networks:
      - soc-net

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: zero-trust-soc-prod-kafka-1
    user: "1000:1000"
    depends_on:
      zookeeper:
        condition: service_healthy
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_HEAP_OPTS: "-Xms256m -Xmx256m"
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "localhost:9092", "--list"]
      interval: 15s
      start_period: 60s
      retries: 5
    logging: *default-logging
    <<: *default-security
    cap_drop:
      - ALL
    restart: always
    networks:
      - soc-net

  kafka-init:
    image: confluentinc/cp-kafka:7.5.0
    container_name: zero-trust-soc-prod-kafka-init-1
    user: "1000:1000"
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: >-
      bash -c "kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 6 --replication-factor 1 --topic raw-logs ;
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 6 --replication-factor 1 --topic enriched-events ;
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 6 --replication-factor 1 --topic alerts ;
      kafka-topics --create --if-not-exists --bootstrap-server kafka:9092 --partitions 3 --replication-factor 1 --topic triaged-alerts ;
      echo All topics created."
    logging: *default-logging
    networks:
      - soc-net

  kafka-exporter:
    image: danielqsj/kafka-exporter:latest
    ports: ["9308:9308"]
    user: "1000:1000"
    command: ["--kafka.server=kafka:9092"]
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9308/metrics >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    logging: *default-logging
    <<: *default-security
    cap_drop:
      - ALL
    restart: always
    networks:
      - soc-net


  opensearch:
    image: opensearchproject/opensearch:2.11.0
    container_name: opensearch-prod
    user: "1000:1000"
    environment:
      - cluster.name=soc-prod
      - node.name=opensearch
      - discovery.type=single-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD}
      - compatibility.override_main_response_version=true
      - DISABLE_INSTALL_DEMO_CONFIG=true
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
      - ../../infrastructure/docker-compose/opensearch_config.yml:/usr/share/opensearch/config/opensearch.yml:ro
      - ../../infrastructure/tls/certs/opensearch.crt:/usr/share/opensearch/config/certs/opensearch.crt:ro
      - ../../infrastructure/tls/certs/opensearch.key:/usr/share/opensearch/config/certs/opensearch.key:ro
      - ../../infrastructure/tls/certs/opensearch-admin.crt:/usr/share/opensearch/config/certs/opensearch-admin.crt:ro
      - ../../infrastructure/tls/certs/opensearch-admin.key:/usr/share/opensearch/config/certs/opensearch-admin.key:ro
      - ../../infrastructure/tls/ca/ca.crt:/usr/share/opensearch/config/certs/ca.crt:ro
    ports:
      - "9200:9200"
    deploy:
      resources:
        limits:
          memory: 1536M
    healthcheck:
      test: ["CMD-SHELL", "curl -sf --cacert /usr/share/opensearch/config/certs/ca.crt --user admin:${OPENSEARCH_ADMIN_PASSWORD} https://opensearch:9200/_cluster/health >/dev/null || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 15
      start_period: 60s
    logging: *default-logging
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETGID
      - SETUID
    restart: always
    networks:
      soc-net:
        aliases:
          - opensearch
          - shuffle-opensearch
          - node-0.example.com

  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:2.11.0
    ports: ["5601:5601"]
    user: "1000:1000"
    environment:
      OPENSEARCH_HOSTS: '["https://opensearch:9200"]'
      OPENSEARCH_USERNAME: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
      OPENSEARCH_SSL_VERIFICATIONMODE: full
      OPENSEARCH_SSL_CERTIFICATEAUTHORITIES: /usr/share/opensearch-dashboards/config/certs/ca.crt
    volumes:
      - ../../infrastructure/tls/ca/ca.crt:/usr/share/opensearch-dashboards/config/certs/ca.crt:ro
    depends_on:
      opensearch:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -s -o /dev/null -w '%{http_code}' http://localhost:5601/api/status | grep -Eq '^(200|401)$' || exit 1"]
      interval: 30s
      timeout: 10s
      start_period: 90s
      retries: 5
    logging: *default-logging
    <<: *default-security
    cap_drop:
      - ALL
    restart: always
    networks:
      - soc-net


  suricata:
    image: jasonish/suricata:latest
    container_name: suricata-prod
    user: "0:0"
    network_mode: host
    volumes:
      - ../../collection/suricata/suricata.yaml:/etc/suricata/suricata.yaml
      - suricata-logs:/var/log/suricata
    command: ["-c", "/etc/suricata/suricata.yaml", "-i", "eth0"]
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "test -d /var/log/suricata || exit 1"]
      interval: 30s
      retries: 3
    logging: *default-logging
    restart: always

  suricata-bridge:
    build:
      context: ../../collection/suricata
    user: "0:0"
    depends_on:
      kafka:
        condition: service_healthy
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: raw-logs
      SURICATA_LOG_FILE: /var/log/suricata/eve.json
    volumes:
      - suricata-logs:/var/log/suricata:ro
    deploy:
      resources:
        limits:
          memory: 64M
    logging: *default-logging
    <<: *default-security
    cap_drop:
      - ALL
    restart: always
    networks:
      - soc-net

  wazuh-manager:
    image: wazuh/wazuh-manager:4.7.0
    entrypoint:
      - /bin/sh
      - -c
      - mkdir -p /var/ossec/etc/shared /var/ossec/logs/alerts && touch /var/ossec/etc/shared/ar.conf /var/ossec/logs/alerts/alerts.json /var/ossec/logs/alerts/alerts.log && chown -R wazuh:wazuh /var/ossec/etc/shared /var/ossec/logs/alerts && exec /init
    ports:
      - "1514:1514"
      - "1515:1515"
      - "55000:55000"
    volumes:
      - wazuh-data:/var/ossec/data
      - wazuh-logs:/var/ossec/logs
      - ../../collection/wazuh-config/ossec.conf:/var/ossec/etc/ossec.conf
    deploy:
      resources:
        limits:
          memory: 384M
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/55000' || exit 1"]
      interval: 60s
      timeout: 10s
      retries: 3
    logging: *default-logging
    restart: always
    networks:
      - soc-net

  wazuh-kafka-bridge:
    build:
      context: ../../collection/wazuh-kafka-bridge
    user: "101:101"
    depends_on:
      wazuh-manager:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - wazuh-logs:/var/ossec/logs:ro
    environment:
      WAZUH_ALERT_LOG: /var/ossec/logs/alerts/alerts.json
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      KAFKA_TOPIC: raw-logs
    deploy:
      resources:
        limits:
          memory: 96M
    logging: *default-logging
    <<: *default-security
    cap_drop:
      - ALL
    restart: always
    networks:
      - soc-net


  vault:
    image: hashicorp/vault:1.14
    container_name: vault-prod
    environment:
      VAULT_ADDR: 'https://127.0.0.1:8200'
      VAULT_CACERT: /vault/config/ca.crt
    command: ["server"]
    volumes:
      - vault-data:/vault/file
      - ../../infrastructure/vault/vault-config.json:/vault/config/vault.json:ro
      - ../../infrastructure/tls/certs/vault.crt:/vault/config/vault.crt:ro
      - ../../infrastructure/tls/certs/vault.key:/vault/config/vault.key:ro
      - ../../infrastructure/tls/ca/ca.crt:/vault/config/ca.crt:ro
    cap_add:
      - IPC_LOCK
    ports:
      - "8200:8200"
    deploy:
      resources:
        limits:
          memory: 192M
    healthcheck:
      test: ["CMD-SHELL", "vault status >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      start_period: 45s
      retries: 5
    logging: *default-logging
    restart: always
    networks:
      - soc-net

  keycloak-postgres:
    image: postgres:16-alpine
    container_name: keycloak-postgres-prod
    environment:
      POSTGRES_DB: keycloak
      POSTGRES_USER: keycloak
      POSTGRES_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
    volumes:
      - keycloak-postgres-data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 192M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keycloak -d keycloak || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging: *default-logging
    restart: always
    networks:
      - soc-net

  keycloak:
    image: quay.io/keycloak/keycloak:23.0.0
    container_name: keycloak-prod
    user: "1000:1000"
    entrypoint: ["/bin/sh", "-c"]
    command:
      - >-
        sh /opt/keycloak/data/import/render-realm.sh &&
        exec /opt/keycloak/bin/kc.sh start --import-realm
    ports:
      - "8443:8443"
    volumes:
      - ../../identity/keycloak:/opt/keycloak/data/import
      - ../../infrastructure/tls/certs/keycloak.crt:/opt/keycloak/conf/keycloak.crt:ro
      - ../../infrastructure/tls/certs/keycloak.key:/opt/keycloak/conf/keycloak.key:ro
      - ../../infrastructure/tls/ca/ca.crt:/opt/keycloak/conf/ca.crt:ro
    depends_on:
      keycloak-postgres:
        condition: service_healthy
    environment:
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL_HOST: keycloak-postgres
      KC_DB_URL_DATABASE: keycloak
      KC_DB_USERNAME: keycloak
      KC_DB_PASSWORD: ${KEYCLOAK_DB_PASSWORD}
      KC_HTTPS_CERTIFICATE_FILE: /opt/keycloak/conf/keycloak.crt
      KC_HTTPS_CERTIFICATE_KEY_FILE: /opt/keycloak/conf/keycloak.key
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "false"
      KC_HEALTH_ENABLED: "true"
      KC_HTTP_MANAGEMENT_HEALTH_ENABLED: "true"
      KC_DB_POOL_MAX_SIZE: 5
      KC_DB_POOL_MIN_SIZE: 1
      KEYCLOAK_GRAFANA_CLIENT_SECRET: ${KEYCLOAK_GRAFANA_CLIENT_SECRET}
      KEYCLOAK_OPENSEARCH_CLIENT_SECRET: ${KEYCLOAK_OPENSEARCH_CLIENT_SECRET}
      KEYCLOAK_SHUFFLE_CLIENT_SECRET: ${KEYCLOAK_SHUFFLE_CLIENT_SECRET}
      SOC_ANALYST_INITIAL_PASSWORD: ${SOC_ANALYST_INITIAL_PASSWORD}
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "bash -lc 'exec 3<>/dev/tcp/127.0.0.1/8443' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    logging: *default-logging
    <<: *default-security
    cap_drop:
      - ALL
    restart: always
    networks:
      - soc-net


  anomaly-detector:
    build:
      context: ../../ml-models/anomaly-detection
    user: "1000:1000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OPENSEARCH_HOST: opensearch:9200
      OPENSEARCH_USER: admin
      OPENSEARCH_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
      OPENSEARCH_TRAINING_INDEX: anomaly_training_seed
      MODEL_PATH: /app/models/model.pkl
      FORCE_RETRAIN: "false"
    depends_on:
      opensearch:
        condition: service_healthy
      kafka:
        condition: service_healthy
    volumes:
      - anomaly-model:/app/models
    deploy:
      resources:
        limits:
          memory: 192M
    logging: *default-logging
    <<: *default-security
    cap_drop:
      - ALL
    restart: always
    networks:
      - soc-net

  detection-engine:
    build:
      context: ../../detection/flink-jobs
    user: "1000:1000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    volumes:
      - ../../detection/flink-config:/app/config:ro
    deploy:
      resources:
        limits:
          memory: 192M
    logging: *default-logging
    <<: *default-security
    cap_drop:
      - ALL
    restart: always
    networks:
      - soc-net

  alert-triage:
    build:
      context: ../../ml-models/llm-triage
    user: "1000:1000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      INPUT_TOPIC: alerts
      OUTPUT_TOPIC: triaged-alerts
      OLLAMA_URL: http://host.docker.internal:11434/api/generate
      OLLAMA_MODEL: llama3:latest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      kafka:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 64M
    logging: *default-logging
    <<: *default-security
    cap_drop:
      - ALL
    restart: always
    networks:
      - soc-net

  ueba-engine:
    build:
      context: ../../ml-models/ueba
    user: "0:0"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      INPUT_TOPIC: raw-logs
      OUTPUT_TOPIC: alerts
      BASELINE_WINDOW_HOURS: "24"
      ANOMALY_THRESHOLD: "2.5"
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      GNN_INTERVAL_SECONDS: "300"
    depends_on:
      kafka:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 256M
    logging: *default-logging
    <<: *default-security
    cap_drop:
      - ALL
    restart: always
    networks:
      - soc-net


  neo4j:
    image: neo4j:5.15-community
    user: "0:0"
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD}
      NEO4J_dbms_memory_heap_initial__size: 192m
      NEO4J_dbms_memory_heap_max__size: 192m
      NEO4J_dbms_memory_pagecache_size: 64m
    ports:
      - "7474:7474"
      - "7687:7687"
    volumes:
      - neo4j-data:/data
    deploy:
      resources:
        limits:
          memory: 384M
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p ${NEO4J_PASSWORD} 'RETURN 1' >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 45s
    logging: *default-logging
    <<: *default-security
    restart: always
    networks:
      - soc-net



  automation-engine:
    build:
      context: ../../automation
    user: "1000:1000"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      INPUT_TOPIC: triaged-alerts
      COOLDOWN_SECONDS: "3600"
      DRY_RUN: "true"
      OPENSEARCH_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
    depends_on:
      kafka:
        condition: service_healthy
    cap_drop:
      - ALL
    cap_add:
      - NET_ADMIN
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD", "python3", "-c", "import os; exit(0 if os.path.exists('/app/response_coordinator.py') else 1)"]
      interval: 30s
    logging: *default-logging
    restart: always
    networks:
      - soc-net



  shuffle-backend:
    image: ghcr.io/shuffle/shuffle-backend:latest
    command: ["sh", "-lc", "cat /usr/local/share/ca-certificates/zt-ca.crt >> /etc/ssl/certs/ca-certificates.crt && exec ./shufflebackend"]
    ports:
      - "5001:5001"
    environment:
      - SHUFFLE_APP_SDK_VERSION=1.2.0
      - SHUFFLE_OPENSEARCH_URL=https://shuffle_svc:${OPENSEARCH_ADMIN_PASSWORD}@opensearch:9200
      - SHUFFLE_OPENSEARCH_SKIPSSL_VERIFY=false
      - SHUFFLE_SKIPSSL_VERIFY=false
      - SHUFFLE_CLOUDRUN_DATABASE_URL=https://shuffle_svc:${OPENSEARCH_ADMIN_PASSWORD}@opensearch:9200
      - SHUFFLE_OPENSEARCH_API_ROOT=https://shuffle_svc:${OPENSEARCH_ADMIN_PASSWORD}@opensearch:9200
      - SHUFFLE_OPENSEARCH_API_USER=shuffle_svc
      - SHUFFLE_OPENSEARCH_API_PASSWORD=${OPENSEARCH_ADMIN_PASSWORD}
      - SHUFFLE_ENCRYPTION_KEY=${SHUFFLE_ENCRYPTION_KEY}
      - SHUFFLE_ENCRYPTION_MODIFIER=${SHUFFLE_ENCRYPTION_MODIFIER}
      - SSL_CERT_FILE=/usr/local/share/ca-certificates/zt-ca.crt
      - HTTP_PORT=5001
      - SHUFFLE_HEALTHCHECK_DISABLED=true
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    volumes:
      - ../../infrastructure/tls/ca/ca.crt:/usr/local/share/ca-certificates/zt-ca.crt:ro
    depends_on:
      opensearch:
        condition: service_healthy
      docker-socket-proxy:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 512M
    logging: *default-logging
    restart: always
    networks:
      - soc-net

  shuffle-frontend:
    image: ghcr.io/shuffle/shuffle-frontend:latest
    ports:
      - "3001:80"
    environment:
      - BACKEND_HOSTNAME=shuffle-backend
    depends_on:
      - shuffle-backend
    deploy:
      resources:
        limits:
          memory: 96M
    logging: *default-logging
    restart: always
    networks:
      - soc-net

  shuffle-orborus:
    image: ghcr.io/shuffle/shuffle-orborus:latest
    environment:
      - SHUFFLE_APP_SDK_VERSION=1.2.0
      - ORBORUS_CONTAINER_NAME=shuffle-orborus
      - SHUFFLE_BASE_URL=http://shuffle-backend:5001
      - SHUFFLE_SKIP_PIPELINES=true
      - DOCKER_API_VERSION=1.44
      - DOCKER_HOST=tcp://docker-socket-proxy:2375
    depends_on:
      - docker-socket-proxy
    deploy:
      resources:
        limits:
          memory: 96M
    logging: *default-logging
    restart: always
    networks:
      - soc-net


  prometheus:
    image: prom/prometheus:v2.49.0
    user: "0:0"
    read_only: true
    volumes:
      - ../../observability/prometheus:/etc/prometheus:ro
    tmpfs:
      - /prometheus
      - /tmp
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
    ports:
      - "9090:9090"
    deploy:
      resources:
        limits:
          memory: 192M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging
    <<: *default-security
    cap_drop:
      - ALL
    restart: always
    networks:
      - soc-net

  alertmanager:
    image: prom/alertmanager:v0.27.0
    user: "0:0"
    read_only: true
    entrypoint: ["/bin/sh", "-c"]
    volumes:
      - ../../observability/alertmanager:/etc/alertmanager-ro:ro
    tmpfs:
      - /etc/alertmanager
      - /tmp
    command:
      - >-
        cp /etc/alertmanager-ro/alertmanager.yml /etc/alertmanager/alertmanager.yml &&
        sed -i "s|SMTP_SMARTHOST_PLACEHOLDER|${SMTP_SERVER}:${SMTP_PORT}|g" /etc/alertmanager/alertmanager.yml &&
        sed -i "s|SMTP_FROM_PLACEHOLDER|${SMTP_USER}|g" /etc/alertmanager/alertmanager.yml &&
        sed -i "s|SMTP_USER_PLACEHOLDER|${SMTP_USER}|g" /etc/alertmanager/alertmanager.yml &&
        sed -i "s|SMTP_PASSWORD_PLACEHOLDER|${SMTP_PASSWORD}|g" /etc/alertmanager/alertmanager.yml &&
        sed -i "s|ALERT_RECIPIENT_PLACEHOLDER|${ALERT_RECIPIENT}|g" /etc/alertmanager/alertmanager.yml &&
        exec /bin/alertmanager --config.file=/etc/alertmanager/alertmanager.yml --storage.path=/etc/alertmanager
    ports:
      - "9093:9093"
    deploy:
      resources:
        limits:
          memory: 64M
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging
    <<: *default-security
    cap_drop:
      - ALL
    restart: always
    networks:
      - soc-net

  grafana:
    image: grafana/grafana:10.2.0
    user: "472"
    read_only: true
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_INSTALL_PLUGINS: grafana-opensearch-datasource
      OPENSEARCH_ADMIN_PASSWORD: ${OPENSEARCH_ADMIN_PASSWORD}
      GF_SERVER_PROTOCOL: https
      GF_SERVER_CERT_FILE: /etc/grafana/grafana.crt
      GF_SERVER_CERT_KEY: /etc/grafana/grafana.key
    volumes:
      - grafana-data:/var/lib/grafana
      - ../../dashboards/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ../../dashboards/grafana/datasources:/etc/grafana/provisioning/datasources:ro
      - ../../infrastructure/tls/certs/grafana.crt:/etc/grafana/grafana.crt:ro
      - ../../infrastructure/tls/certs/grafana.key:/etc/grafana/grafana.key:ro
    tmpfs:
      - /tmp
    ports:
      - "3000:3000"
    deploy:
      resources:
        limits:
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "curl -ksf https://localhost:3000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
    logging: *default-logging
    <<: *default-security
    cap_drop:
      - ALL
    restart: always
    networks:
      - soc-net


  minio:
    image: minio/minio:latest
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    deploy:
      resources:
        limits:
          memory: 192M
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 20s
      retries: 5
    logging: *default-logging
    <<: *default-security
    cap_drop:
      - ALL
    restart: always
    networks:
      - soc-net


volumes:
  opensearch-data:
    labels:
      backup.enabled: "true"
      backup.schedule: "0 */6 * * *"
  wazuh-data:
  wazuh-logs:
  minio-data:
  grafana-data:
  vault-data:
    labels:
      backup.enabled: "true"
      backup.schedule: "0 0 * * *"
  anomaly-model:
  suricata-logs:
  keycloak-postgres-data:
  neo4j-data:



networks:
  soc-net:
    driver: bridge
    name: soc-net-prod
